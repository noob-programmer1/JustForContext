name: DevSwitch
options:
  bundleIdPrefix: com.devswitch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  DevSwitch:
    type: application
    platform: macOS
    sources:
      - path: DevSwitch
        excludes:
          - "**/*.xcassets"
    resources:
      - path: DevSwitch/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devswitch.app
        PRODUCT_NAME: DevSwitch
        INFOPLIST_FILE: DevSwitch/Info.plist
        CODE_SIGN_ENTITLEMENTS: DevSwitch/DevSwitch.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
